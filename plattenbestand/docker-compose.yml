services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-ibe-plattenbestand-produktion-geheim}
      - DATABASE_URL=postgresql://plattenbestand:plattenbestand@db:5432/plattenbestand
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=plattenbestand
      - POSTGRES_PASSWORD=plattenbestand
      - POSTGRES_DB=plattenbestand
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plattenbestand"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
